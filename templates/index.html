<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="hero-text">

    <h1>
        🏠 AI-Powered House Price Prediction
    </h1>

    <p>
        Predict residential property prices using
        Machine Learning and explore market trends
        through interactive analytics dashboards.
    </p>

</div>


    <div class="container">

        <h1>🏠 House Price Prediction</h1>

        <form action="/predict" method="POST">

            <div class="input-group">
                <label for="overall_qual">Overall Quality (1 - 10)</label>
                <input
                    type="number"
                    id="overall_qual"
                    name="overall_qual"
                    placeholder="Enter Overall Quality"
                    required>
            </div>

            <div class="input-group">
                <label for="gr_liv_area">Living Area (sq ft)</label>
                <input
                    type="number"
                    id="gr_liv_area"
                    name="gr_liv_area"
                    placeholder="Enter Living Area"
                    required>
            </div>

            <div class="input-group">
                <label for="garage_cars">Garage Capacity</label>
                <input
                    type="number"
                    id="garage_cars"
                    name="garage_cars"
                    placeholder="Enter Garage Capacity"
                    required>
            </div>

            <div class="input-group">
                <label for="garage_area">Garage Area</label>
                <input
                    type="number"
                    id="garage_area"
                    name="garage_area"
                    placeholder="Enter Garage Area"
                    required>
            </div>

            <div class="input-group">
                <label for="full_bath">Full Bathrooms</label>
                <input
                    type="number"
                    id="full_bath"
                    name="full_bath"
                    placeholder="Enter Number of Bathrooms"
                    required>
            </div>

            <div class="input-group">
                <label for="year_built">Year Built</label>
                <input
                    type="number"
                    id="year_built"
                    name="year_built"
                    placeholder="Enter Year Built"
                    required>
            </div>

            <button type="submit">
    🏠 Predict House Price
</button>

        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}

        <div style="margin-top:20px;">
            <a href="/dashboard">
                <button type="button" class="dashboard-btn">
                    📊 View Analytics Dashboard
                </button>
            </a>
        </div>


    </div>

</body>
</html>
